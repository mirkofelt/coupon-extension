<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CouponAlert – Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 32px;
      max-width: 640px;
    }

    h1 { font-size: 20px; color: #10b981; margin-bottom: 24px; }

    section { margin-bottom: 32px; }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      color: #94a3b8;
      font-size: 12px;
    }

    input[type="text"], input[type="url"] {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      padding: 8px 12px;
      font-size: 13px;
      margin-bottom: 12px;
      font-family: monospace;
    }
    input:focus { outline: none; border-color: #10b981; }

    .hint {
      font-size: 11px;
      color: #475569;
      margin-top: -8px;
      margin-bottom: 12px;
    }

    button {
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #059669; }

    #status {
      display: inline-block;
      margin-left: 12px;
      font-size: 12px;
      color: #10b981;
    }

    #clear-btn {
      background: #1e293b;
      color: #ef4444;
      border: 1px solid #334155;
      margin-left: 8px;
    }
    #clear-btn:hover { background: #334155; }

    #voucher-count {
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>CouponAlert Settings</h1>

  <section>
    <h2>Source Page</h2>
    <label for="source-url">URL of the voucher source page</label>
    <input type="url" id="source-url" placeholder="https://example.com/vouchers">
    <p class="hint">Visit this page while the extension is active to import vouchers automatically.</p>
  </section>

  <section>
    <h2>CSS Selectors (source page structure)</h2>

    <label for="sel-item">Voucher container (repeating element)</label>
    <input type="text" id="sel-item" placeholder=".voucher-item">

    <label for="sel-provider">Provider / company name</label>
    <input type="text" id="sel-provider" placeholder=".provider-name">

    <label for="sel-code">Voucher code</label>
    <input type="text" id="sel-code" placeholder=".voucher-code">

    <label for="sel-discount">Discount description (optional)</label>
    <input type="text" id="sel-discount" placeholder=".discount-info">

    <label for="sel-expiry">Expiry date (optional)</label>
    <input type="text" id="sel-expiry" placeholder=".expiry-date">

    <p class="hint">Use your browser's DevTools inspector to find the right selectors on your source page.</p>
  </section>

  <section>
    <div>
      <button id="save-btn">Save Settings</button>
      <button id="clear-btn">Clear Vouchers</button>
      <span id="status"></span>
    </div>
    <p id="voucher-count"></p>
  </section>

  <script src="src/options.js"></script>
</body>
</html>
