name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-version:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version not already released
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r '.version' extension/manifest.json)
          TAG="v${VERSION}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Bump the version in extension/manifest.json before merging."
            exit 1
          fi
          echo "Version $TAG is not yet released — OK."

  build:
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: |
            extension/manifest.json
            extension/popup.html
            extension/options.html
            extension/icons/
            extension/dist/
          retention-days: 7
