<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CouponAlert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f172a;
      color: #e2e8f0;
      width: 340px;
      min-height: 100px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
    }

    header h1 { font-size: 15px; font-weight: 600; color: #10b981; }

    #settings-btn {
      background: none; border: none; color: #64748b;
      cursor: pointer; font-size: 16px; padding: 2px 4px;
    }
    #settings-btn:hover { color: #94a3b8; }

    #voucher-list { list-style: none; max-height: 480px; overflow-y: auto; }

    .count-row {
      padding: 12px 16px;
      color: #64748b;
      font-size: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .count-row strong { color: #94a3b8; }

    #match-section { padding: 12px 16px; }
    #match-section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #475569;
      margin-bottom: 10px;
    }

    .match-provider {
      font-weight: 700;
      color: #f1f5f9;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .discount-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .discount-text { font-size: 12px; color: #94a3b8; flex: 1; }

    .copy-btn {
      background: #1e293b; border: 1px solid #334155;
      color: #10b981; border-radius: 4px; padding: 3px 9px;
      font-size: 12px; cursor: pointer; white-space: nowrap;
      font-family: monospace; flex-shrink: 0;
    }
    .copy-btn:hover { background: #334155; }
    .copy-btn.copied { color: #fff; border-color: #fff; }

    .no-code { font-size: 11px; color: #334155; font-style: italic; }

    .offer-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 11px;
      color: #10b981;
      text-decoration: none;
    }
    .offer-link:hover { text-decoration: underline; }

    #no-match {
      padding: 20px 16px;
      color: #475569;
      font-size: 12px;
      text-align: center;
    }

    #empty {
      padding: 24px 16px; text-align: center; color: #475569; font-size: 12px;
    }
    #empty a, .source-link-item { color: #10b981; text-decoration: none; cursor: pointer; }
    #empty a:hover, .source-link-item:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>CouponAlert</h1>
    <button id="settings-btn" title="Settings">⚙</button>
  </header>

  <div id="count-row" class="count-row" style="display:none"></div>
  <div id="match-section" style="display:none"></div>
  <div id="no-match" style="display:none">No voucher for this site.</div>
  <div id="empty" style="display:none">
    No vouchers yet.<br>
    Visit your <span id="source-links"></span> to import them.
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
