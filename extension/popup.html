<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CouponAlert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f172a;
      color: #e2e8f0;
      width: 340px;
      min-height: 100px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
    }

    header h1 { font-size: 15px; font-weight: 600; color: #10b981; }

    #settings-btn {
      background: none; border: none; color: #64748b;
      cursor: pointer; font-size: 16px; padding: 2px 4px;
    }
    #settings-btn:hover { color: #94a3b8; }

    #voucher-list { list-style: none; max-height: 480px; overflow-y: auto; }

    #voucher-list > li {
      padding: 8px 16px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #voucher-list > li:last-child { border-bottom: none; }

    .provider-name {
      font-weight: 600;
      color: #f1f5f9;
      font-size: 12px;
      flex-shrink: 0;
      width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .discounts-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      flex: 1;
    }

    .discount-label {
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.4;
    }

    .copy-btn {
      background: #1e293b; border: 1px solid #334155;
      color: #10b981; border-radius: 4px; padding: 2px 7px;
      font-size: 11px; cursor: pointer; white-space: nowrap;
      font-family: monospace; flex-shrink: 0;
    }
    .copy-btn:hover { background: #334155; }
    .copy-btn.copied { color: #fff; border-color: #fff; }

    #empty {
      padding: 24px 16px; text-align: center; color: #475569;
    }
    #empty a { color: #10b981; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>CouponAlert</h1>
    <button id="settings-btn" title="Settings">⚙</button>
  </header>

  <ul id="voucher-list"></ul>
  <div id="empty" style="display:none">
    No vouchers stored yet.<br>
    Visit your <a id="source-link" href="#">source page</a> to import them.
  </div>

  <script src="src/popup.js"></script>
</body>
</html>
