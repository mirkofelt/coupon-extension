<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CouponAlert – Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 32px;
      max-width: 760px;
    }

    h1 { font-size: 20px; color: #10b981; margin-bottom: 28px; }
    section { margin-bottom: 36px; }
    h2 {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: #64748b; margin-bottom: 14px; font-weight: 500;
    }

    label { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 12px; }
    input[type="url"], input[type="text"], input[type="number"], input[type="search"], select {
      width: 100%; background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; color: #f1f5f9; padding: 8px 12px;
      font-size: 13px; margin-bottom: 8px;
    }
    input[type="url"], input[type="text"] { font-family: monospace; }
    input[type="number"] { width: 80px; font-family: inherit; }
    input:focus, select:focus { outline: none; border-color: #10b981; }
    select { background-image: none; }

    .hint { font-size: 11px; color: #475569; margin-top: -4px; margin-bottom: 12px; line-height: 1.5; }

    .btn-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    button {
      background: #10b981; color: #fff; border: none;
      border-radius: 6px; padding: 8px 16px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #059669; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-secondary:hover { background: #334155; color: #e2e8f0; }
    .btn-danger { background: #1e293b; color: #ef4444; border: 1px solid #334155; }
    .btn-danger:hover { background: #334155; }

    #status { font-size: 12px; color: #10b981; }

    /* Sources list */
    .source-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

    .source-group-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: #64748b; font-weight: 500; margin-bottom: 8px;
    }

    .source-url-inline {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      border-radius: 4px; color: #94a3b8; padding: 5px 8px;
      font-size: 11px; font-family: monospace; margin-top: 4px; margin-bottom: 2px;
    }
    .source-url-inline:focus { outline: none; border-color: #10b981; }

    .source-item {
      display: flex; align-items: center; gap: 10px;
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 10px 14px;
    }
    .source-item.disabled { opacity: .5; }

    .source-toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .source-toggle input { opacity: 0; width: 0; height: 0; }
    .source-toggle-slider {
      position: absolute; inset: 0; background: #334155; border-radius: 20px; cursor: pointer; transition: .2s;
    }
    .source-toggle input:checked + .source-toggle-slider { background: #10b981; }
    .source-toggle-slider::before {
      content: ""; position: absolute; width: 14px; height: 14px; background: #fff;
      border-radius: 50%; left: 3px; top: 3px; transition: .2s;
    }
    .source-toggle input:checked + .source-toggle-slider::before { transform: translateX(16px); }

    .source-info { flex: 1; min-width: 0; }
    .source-label { font-size: 13px; font-weight: 600; color: #f1f5f9; }
    .source-url { font-size: 11px; color: #475569; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .source-last { font-size: 11px; color: #475569; margin-top: 2px; }
    .source-last.source-error { color: #f59e0b; }

    .source-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-icon {
      background: none; border: none; color: #475569; cursor: pointer; font-size: 14px; padding: 4px;
    }
    .btn-icon:hover { color: #94a3b8; }
    .btn-refresh { color: #10b981; }
    .btn-refresh:hover { color: #059669; }

    /* Add source form */
    .add-form {
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 16px; margin-bottom: 8px;
    }
    .add-form-grid { display: grid; grid-template-columns: 1fr 140px; gap: 8px; margin-bottom: 8px; }
    .add-form-grid input { margin-bottom: 0; }

    /* Refresh settings */
    .interval-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .interval-row input[type="number"] { margin-bottom: 0; }
    .interval-row label { margin-bottom: 0; white-space: nowrap; }

    /* Voucher table */
    #voucher-meta { font-size: 12px; color: #475569; margin-bottom: 12px; }

    .voucher-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .voucher-table th {
      text-align: left; padding: 6px 10px; color: #475569;
      border-bottom: 1px solid #1e293b; font-weight: 500;
      font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    }
    .voucher-table td { padding: 8px 10px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
    .voucher-table tr:last-child td { border-bottom: none; }
    .voucher-table tr:hover td { background: #1e293b; }
    .voucher-table tr[hidden] { display: none; }

    .provider-cell { color: #f1f5f9; font-weight: 600; }
    .domain-cell { color: #475569; font-family: monospace; font-size: 12px; }
    .code-cell { font-family: monospace; font-size: 12px; color: #10b981; cursor: pointer; }
    .nocode-cell { font-size: 11px; color: #334155; font-style: italic; }
    .source-cell { font-size: 11px; color: #475569; }
    .no-vouchers { color: #475569; font-size: 13px; }

    /* Pagination */
    #pagination { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
    #pagination button { padding: 6px 14px; font-size: 12px; font-weight: 500; }
    .page-info { font-size: 12px; color: #475569; }

    /* Hover tooltip */
    #voucher-tooltip {
      position: fixed; z-index: 9999; display: none;
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 12px 14px; max-width: 340px; min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5); pointer-events: none;
      font-size: 12px; line-height: 1.5;
    }
    #voucher-tooltip.visible { display: block; }
    .tip-discount { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #334155; }
    .tip-discount:last-of-type { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .tip-text { color: #f1f5f9; }
    .tip-code { font-family: monospace; color: #10b981; font-size: 13px; font-weight: 600; }
    .tip-cond { color: #64748b; font-size: 11px; margin-top: 2px; }
    .tip-footer { color: #334155; font-size: 10px; margin-top: 8px; }
    .voucher-table tbody tr:hover td { background: #243144; cursor: default; }

    /* Blocked keywords */
    textarea {
      width: 100%; background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; color: #f1f5f9; padding: 8px 12px;
      font-size: 12px; font-family: monospace; resize: vertical; min-height: 72px;
      margin-bottom: 8px;
    }
    textarea:focus { outline: none; border-color: #10b981; }
  </style>
</head>
<body>
  <h1 data-i18n="optionsTitle">CouponAlert Settings</h1>

  <section>
    <h2 data-i18n="sourcesSection">Sources</h2>
    <div id="source-list" class="source-list"></div>

    <div id="add-form" class="add-form" style="display:none">
      <div class="add-form-grid">
        <div>
          <label data-i18n="labelUrl">URL</label>
          <input type="url" id="add-url" data-i18n-placeholder="placeholderUrl">
        </div>
        <div>
          <label data-i18n="labelName">Name</label>
          <input type="text" id="add-label" data-i18n-placeholder="placeholderName">
        </div>
      </div>
      <div class="btn-row">
        <button id="add-confirm-btn" data-i18n="btnAdd">Add</button>
        <button class="btn-secondary" id="add-cancel-btn" data-i18n="btnCancel">Cancel</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" id="add-btn" data-i18n="btnAddSource">+ Add Custom Source</button>
      <button class="btn-danger" id="clear-btn" data-i18n="btnClearVouchers">Clear All Vouchers</button>
      <span id="status"></span>
    </div>
  </section>

  <section>
    <h2 data-i18n="blockedSection">Blocked Categories</h2>
    <label data-i18n="labelBlockedHint">Skip providers matching these keywords (one per line, case-insensitive)</label>
    <textarea id="blocked-keywords" placeholder="auto&#10;kfz&#10;leasing"></textarea>
    <p class="hint" data-i18n="hintBlocked">Providers whose name contains any of these words will be skipped during scraping.</p>
    <button id="save-blocked-btn" data-i18n="btnSave">Save</button>
  </section>

  <section>
    <h2 data-i18n="intervalSection">Auto-Refresh</h2>
    <div class="interval-row">
      <label data-i18n="intervalBefore">Refresh every</label>
      <input type="number" id="interval-hours" min="1" max="168" value="24">
      <label data-i18n="intervalAfter">hours</label>
      <button id="save-interval-btn" data-i18n="btnSave">Save</button>
    </div>
    <p class="hint" style="margin-top:10px" data-i18n="hintInterval">
      The extension refreshes all enabled sources in the background. Sources requiring login need valid session cookies.
    </p>
  </section>

  <section>
    <h2 data-i18n="vouchersSection">Stored Vouchers</h2>
    <p id="voucher-meta"></p>
    <input type="search" id="search" data-i18n-placeholder="placeholderSearch" style="display:none">
    <div id="pagination"></div>
    <div id="voucher-list"></div>
  </section>

  <div id="voucher-tooltip"></div>
  <script src="dist/options.js"></script>
</body>
</html>
